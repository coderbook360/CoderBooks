title: LeetCode 算法技巧篇：掌握核心解题方法
description: 本书系统讲解算法面试中最常用的解题技巧，包括递归思维、双指针、滑动窗口、前缀和、二分查找、贪心算法与回溯算法。每个技巧先讲解核心思想与适用场景，再通过精选 LeetCode 题目进行实战训练，帮助读者掌握举一反三的解题能力。
