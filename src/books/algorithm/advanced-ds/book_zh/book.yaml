title: LeetCode 算法通关之路（五）：高级数据结构篇
description: 本书聚焦于高级数据结构的原理与应用，包括字典树、线段树、树状数组、平衡树、后缀结构、可持久化数据结构以及分块算法等。这些数据结构是解决复杂算法问题的利器，掌握它们将大幅提升你的编程能力。
