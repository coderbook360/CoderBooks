title: LeetCode 算法通关之路（六）：算法竞赛实战篇
description: 本书面向有志于算法竞赛的选手和追求极致的算法爱好者，涵盖数论与数学、高级博弈论、网络流、计算几何、字符串高级算法以及竞赛真题实战等内容。这是算法进阶的最后一程，助你冲击 ACM-ICPC、Codeforces 等顶级赛事。
