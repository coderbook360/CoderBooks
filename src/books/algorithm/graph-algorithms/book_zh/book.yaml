title: LeetCode 图论与搜索篇：连通世界的算法
description: 本书系统讲解图论与搜索算法，包括 DFS、BFS、图的遍历、拓扑排序、并查集、最短路径与最小生成树。每个主题先讲解核心算法原理，再通过精选 LeetCode 题目进行实战训练，帮助读者掌握图论问题的建模与解决方法。
