title: LeetCode 算法通关之路（一）：数据结构与编程基础
description: 本书系统讲解算法面试必备的核心数据结构与编程基础，包括复杂度分析、数组、字符串（含 KMP 算法）、链表、栈、队列、哈希表、堆、二叉树与位运算。每个主题先讲解底层原理与操作方法，再通过精选 LeetCode 题目进行实战训练，帮助读者建立扎实的数据结构基础。
