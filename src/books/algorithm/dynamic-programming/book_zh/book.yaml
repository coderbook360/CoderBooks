title: LeetCode 动态规划精通篇：从状态转移到最优解
description: 本书系统讲解动态规划的核心思想与各类变体，包括记忆化搜索、基础 DP、背包问题、状态机 DP、序列 DP、区间 DP、博弈 DP、状态压缩 DP、数位 DP 与树形 DP。每个主题先讲解状态定义与转移方程的设计方法，再通过精选 LeetCode 题目进行实战训练，帮助读者彻底征服动态规划。
