title: "Vite 内核实现与实践: 构建 mini-vite"
description: 本书通过拆解 Vite 的核心运行机制，围绕开发服务器、插件系统、模块图与 HMR、构建与预览、SSR 等关键模块，规划一条从原理到实现的清晰路径。所有示例均与源码细节对齐，读者将循序搭建一个可运行的 mini-vite。
