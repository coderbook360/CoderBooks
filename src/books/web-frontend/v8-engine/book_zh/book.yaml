title: V8 引擎深度解析：理解 JavaScript 底层运行机制
description: 本书将带你深入 V8 引擎，从前端开发者的视角理解 JavaScript 代码的底层运行机制。我们不是为了研究 V8 源码而学习，而是通过 V8 的实现来解答你在日常开发中的困惑：为什么这样写代码更快？闭包是如何存储的？异步任务是如何调度的？
