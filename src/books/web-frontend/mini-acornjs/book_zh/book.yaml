title: JavaScript解析器实战：从零构建mini-acorn
description: 本书将带你从零开始，一步步构建一个功能完备的 JavaScript 解析器。我们不仅会深入 Acorn 的源码实现，更会结合编译原理的理论知识，让你知其然，更知其所以然。
