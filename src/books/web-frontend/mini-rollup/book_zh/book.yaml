title: Mini-Rollup：从零实现现代 ES 模块打包器
description: 本书将带你从零开始，一步步实现一个功能完备的 Rollup 模块打包器。通过源码级的深度剖析，你将彻底掌握 ES 模块打包、Tree Shaking、代码分割等核心原理。
