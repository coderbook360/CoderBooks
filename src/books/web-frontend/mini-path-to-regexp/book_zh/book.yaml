title: path-to-regexp 源码解析：从零实现 mini-path-to-regexp
description: 本书将带你深入 path-to-regexp 的核心源码，聚焦于其两大核心功能——路径正则化和路径编译的原理与实现。我们将通过构建一个 mini-path-to-regexp，让你彻底掌握 URL 匹配的精髓。
