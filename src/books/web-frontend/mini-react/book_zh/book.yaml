title: Mini-React：从零实现 React 核心原理
description: 本书将带你从零开始，一步步实现一个功能完备的 Mini-React。通过源码级的深度剖析，你将彻底掌握 Virtual DOM、Fiber 架构、Reconciliation 算法、Hooks 系统等 React 核心原理。
