title: Vue 3 源码解析：深入理解框架设计与实现
description: 本书专注于 Vue 3 的核心源码原理，深入剖析响应式系统、调度器、渲染器、组件系统和编译器的完整实现。通过系统性的源码分析，帮助你真正理解 Vue 3 的设计哲学与实现细节。
